name: "nikto"
command: "nikto"
enabled: true
# Allowed exit codes: nikto returns exit code 1 when vulnerabilities are found, which is a normal success state
allowed_exit_codes: [1]
# Short description (for tool list, reduces token consumption)
short_description: "Web server scanning tool for detecting known vulnerabilities and misconfigurations in web servers and applications"
# Detailed tool description
description: |
  Web server scanning tool for detecting known vulnerabilities, misconfigurations, and potential security issues in web servers and applications.

  **Key Features:**
  - Detect web server version and configuration issues
  - Identify known web vulnerabilities and CVEs
  - Detect dangerous files and directories
  - Check server misconfigurations
  - Identify outdated software versions
  - Detect default files and scripts

  **Use Cases:**
  - Web application security assessment
  - Server configuration auditing
  - Vulnerability scanning and discovery
  - Pre-penetration testing information gathering

  **Notes:**
  - Scanning may generate large amounts of logs; manage log storage carefully
  - Some scans may trigger WAF or IDS alerts
  - Recommended to use within authorized scope
  - Scan results require manual verification
# Parameter definitions
parameters:
  - name: "target"
    type: "string"
    description: |
      Target URL or IP address. Can be a complete URL or IP address.

      **Format requirements:**
      - Can include protocol (http:// or https://)
      - Can provide only an IP address or domain name
      - If only IP is provided, defaults to http protocol

      **Example values:**
      - Complete URL: "http://example.com"
      - HTTPS: "https://example.com"
      - IP address: "192.168.1.1"
      - With port: "http://example.com:8080"
      - With path: "http://example.com/admin"

      **Notes:**
      - If only IP is provided, the tool will use http protocol
      - Recommended to provide the full URL to ensure correct scanning
      - Required parameter, cannot be empty
    required: true
    flag: "-h"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional nikto parameters. Used to pass nikto options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
