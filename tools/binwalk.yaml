name: "binwalk"
command: "binwalk"
enabled: true
short_description: "Firmware and file analysis tool"
description: |
  Binwalk is a firmware analysis tool for analyzing, extracting, and reverse engineering firmware images.

  **Key Features:**
  - File signature identification
  - File extraction
  - Entropy analysis
  - Firmware analysis

  **Use Cases:**
  - Firmware analysis
  - File format identification
  - Data extraction
  - Reverse engineering
parameters:
  - name: "file_path"
    type: "string"
    description: "Path to the file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "extract"
    type: "bool"
    description: "Extract discovered files"
    required: false
    flag: "-e"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional binwalk parameters. Used to pass binwalk options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
