name: "anew"
command: "python3"
args:
  - "-c"
  - |
    import shlex
    import subprocess
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing input data\n")
        sys.exit(1)

    input_data = sys.argv[1]
    output_file = sys.argv[2] if len(sys.argv) > 2 else ""
    additional = sys.argv[3] if len(sys.argv) > 3 else ""

    cmd = ["anew"]
    if additional:
        cmd.extend(shlex.split(additional))
    if output_file:
        cmd.append(output_file)

    proc = subprocess.run(
        cmd,
        input=input_data.encode("utf-8"),
        capture_output=True,
        text=True,
    )

    if proc.returncode != 0:
        sys.stderr.write(proc.stderr or proc.stdout)
        sys.exit(proc.returncode)

    sys.stdout.write(proc.stdout)
enabled: true
short_description: "Data deduplication tool for appending new lines to files"
description: |
  Anew is a data deduplication tool that appends new lines to a file, automatically filtering duplicates.

  **Key Features:**
  - Data deduplication
  - File appending
  - Unique line filtering
  - Fast processing

  **Use Cases:**
  - Data processing
  - Result deduplication
  - Data merging
  - Tool chain integration
parameters:
  - name: "input_data"
    type: "string"
    description: "Input data"
    required: true
    position: 0
    format: "positional"
  - name: "output_file"
    type: "string"
    description: "Output file path"
    required: false
    default: ""
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional anew parameters. Used to pass anew options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    default: ""
    position: 2
    format: "positional"
