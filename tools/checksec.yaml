name: "checksec"
command: "checksec"
enabled: true
short_description: "Binary security feature checking tool"
description: |
  Checksec is a tool for checking the security features of binary files.

  **Key Features:**
  - Security feature checks
  - Protection mechanism detection
  - Support for multiple architectures
  - Detailed reports

  **Use Cases:**
  - Binary security analysis
  - Protection mechanism checking
  - Vulnerability research
  - Security assessment
parameters:
  - name: "binary"
    type: "string"
    description: "Path to the binary file to check"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional checksec parameters. Used to pass checksec options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
