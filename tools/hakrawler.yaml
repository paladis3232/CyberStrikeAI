name: "hakrawler"
command: "hakrawler"
enabled: true
short_description: "Web endpoint discovery tool"
description: |
  Hakrawler is a fast, simple web endpoint discovery tool.

  **Key Features:**
  - Web endpoint discovery
  - Link extraction
  - JavaScript file discovery
  - Fast crawling

  **Use Cases:**
  - Web endpoint discovery
  - Content crawling
  - Security testing
  - Bug bounty reconnaissance
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-url"
    format: "flag"
  - name: "depth"
    type: "int"
    description: "Crawl depth"
    required: false
    flag: "-d"
    format: "flag"
    default: 2
  - name: "forms"
    type: "bool"
    description: "Include forms"
    required: false
    flag: "-forms"
    format: "flag"
    default: true
  - name: "additional_args"
    type: "string"
    description: |
      Additional hakrawler parameters. Used to pass hakrawler options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
