name: "gobuster"
command: "gobuster"
enabled: true
short_description: "Web content scanning tool for discovering directories, files, and subdomains"
description: |
  Gobuster is a fast content discovery tool for directory, file, and subdomain enumeration in web applications.

  **Key Features:**
  - Directory and file discovery
  - DNS subdomain enumeration
  - Virtual host discovery
  - Support for multiple modes (dir, dns, fuzz, vhost)

  **Use Cases:**
  - Web application security testing
  - Directory enumeration and file discovery
  - Subdomain discovery
  - Penetration testing reconnaissance
parameters:
  - name: "mode"
    type: "string"
    description: |
      Scan mode (Gobuster subcommand), with the following values:
      - `dir`: Directory/file enumeration
      - `dns`: DNS subdomain enumeration
      - `fuzz`: Template FUZZ scanning
      - `vhost`: Virtual host discovery

      **Note:**
      Gobuster requires the first argument to be the mode subcommand, so it is passed here as a positional argument.
    required: false
    default: "dir"
    position: 0
    format: "positional"
    options: ["dir", "dns", "fuzz", "vhost"]
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file path"
    required: false
    default: "/usr/share/wordlists/dirb/common.txt"
    flag: "-w"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional Gobuster parameters"
    required: false
    format: "positional"
