name: "xxd"
command: "xxd"
enabled: true
short_description: "Hex dump tool"
description: |
  xxd is a hex dump tool for displaying file contents in hexadecimal format.

  **Key Features:**
  - Hex dump
  - Configurable offset and length
  - Reverse conversion
  - Multiple output formats

  **Use Cases:**
  - Binary analysis
  - File inspection
  - Data extraction
  - Forensic analysis
parameters:
  - name: "file_path"
    type: "string"
    description: "Path to the file to dump"
    required: true
    position: 0
    format: "positional"
  - name: "offset"
    type: "string"
    description: "Offset to start reading from"
    required: false
    flag: "-s"
    format: "flag"
    default: "0"
  - name: "length"
    type: "string"
    description: "Number of bytes to read"
    required: false
    flag: "-l"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional xxd parameters. Used to pass xxd options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
