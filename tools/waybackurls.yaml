name: "waybackurls"
command: "waybackurls"
enabled: true
short_description: "Fetch historical URLs from the Wayback Machine"
description: |
  Waybackurls fetches historical URLs for a target domain from the Wayback Machine.

  **Key Features:**
  - Historical URL discovery
  - Version retrieval
  - Subdomain support

  **Use Cases:**
  - Historical URL collection
  - Bug bounty reconnaissance
  - Security testing
  - Content discovery
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain name"
    required: true
    position: 0
    format: "positional"
  - name: "get_versions"
    type: "bool"
    description: "Get all versions of URLs"
    required: false
    flag: "-get-versions"
    format: "flag"
    default: false
  - name: "no_subs"
    type: "bool"
    description: "Exclude subdomains"
    required: false
    flag: "-no-subs"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional waybackurls parameters. Used to pass waybackurls options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
