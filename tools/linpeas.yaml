name: "linpeas"
command: "linpeas.sh"
enabled: true
short_description: "Linux privilege escalation enumeration script that automatically detects common privilege escalation paths"
description: |
  LinPEAS (Linux Privilege Escalation Awesome Script) is an automated privilege escalation enumeration script for detecting common privilege escalation paths in Linux systems.

  **Key Features:**
  - System information gathering
  - Permission and group checks
  - Writable file and directory detection
  - SUID/SGID file discovery
  - Environment variable checks
  - Cron job analysis
  - Network configuration checks
  - Sensitive file discovery

  **Use Cases:**
  - Privilege escalation during penetration testing
  - Security auditing
  - Post-exploitation
  - CTF competitions

  **Notes:**
  - Requires the linpeas.sh script to be downloaded on the target system
  - Execution time may be long
  - Outputs a large amount of information; recommended to save to a file
parameters:
  - name: "output"
    type: "string"
    description: "Output file path (optional)"
    required: false
    flag: "-o"
    format: "flag"
  - name: "fast"
    type: "bool"
    description: "Fast mode, skips time-consuming checks"
    required: false
    flag: "-fast"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional linpeas parameters. Used to pass linpeas options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
