name: "mimikatz"
command: "mimikatz.exe"
enabled: false
short_description: "Windows credential extraction tool for extracting passwords and hashes from memory"
description: |
  Mimikatz is a powerful Windows credential extraction tool that can extract plaintext passwords, hashes, tickets, and other sensitive information from memory.

  **Key Features:**
  - Extract plaintext passwords from memory
  - Extract NTLM hashes
  - Extract Kerberos tickets
  - Pass-the-Hash attacks
  - Pass-the-Ticket attacks
  - Credential dumping

  **Use Cases:**
  - Post-exploitation
  - Lateral movement
  - Privilege escalation
  - Security research

  **Notes:**
  - Requires administrator privileges
  - May be detected by antivirus software
  - For authorized security testing only
  - Must enter the mimikatz interactive command line before use
parameters:
  - name: "command"
    type: "string"
    description: "Mimikatz command, e.g. 'privilege::debug sekurlsa::logonpasswords'"
    required: true
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional mimikatz parameters. Used to pass mimikatz options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
