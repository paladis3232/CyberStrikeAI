name: "dnsenum"
command: "dnsenum"
enabled: true
short_description: "DNS enumeration tool"
description: |
  DNSenum is a DNS information gathering tool for enumerating DNS information.

  **Key Features:**
  - DNS information gathering
  - Subdomain enumeration
  - Zone transfer testing
  - Reverse lookup

  **Use Cases:**
  - DNS enumeration
  - Subdomain discovery
  - Network reconnaissance
  - Penetration testing
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain name"
    required: true
    position: 0
    format: "positional"
  - name: "dns_server"
    type: "string"
    description: "DNS server to use"
    required: false
    flag: "-n"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file for brute forcing"
    required: false
    flag: "-f"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional dnsenum parameters. Used to pass dnsenum options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
