name: "stegsolve"
command: "java"
args: ["-jar"]
enabled: true
short_description: "Image steganography analysis tool for analyzing hidden data in images"
description: |
  Stegsolve is a Java image steganography analysis tool supporting multiple image formats and steganography analysis techniques.

  **Key Features:**
  - Image format conversion
  - Color channel analysis
  - LSB steganography detection
  - Image overlay analysis
  - Data extraction

  **Use Cases:**
  - CTF steganography challenges
  - Image steganography analysis
  - Digital forensics
  - Security research

  **Notes:**
  - Requires Java environment
  - Usually runs as a GUI application
  - May need to be invoked via command line arguments or scripts
parameters:
  - name: "jar_file"
    type: "string"
    description: "Path to the Stegsolve JAR file, e.g. 'stegsolve.jar'"
    required: true
    position: 0
    format: "positional"
  - name: "image"
    type: "string"
    description: "Path to the image file to analyze"
    required: false
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional stegsolve parameters. Used to pass stegsolve options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
