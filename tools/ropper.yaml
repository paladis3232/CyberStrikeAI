name: "ropper"
command: "ropper"
enabled: true
short_description: "Advanced ROP/JOP gadget search tool"
description: |
  Ropper is an advanced ROP/JOP gadget search tool used for exploit development.

  **Key Features:**
  - ROP/JOP gadget searching
  - Gadget quality assessment
  - Multiple architecture support
  - Exploit chain generation

  **Use Cases:**
  - Exploit development
  - ROP chain building
  - Binary analysis
  - Security research
parameters:
  - name: "binary"
    type: "string"
    description: "Path to the binary file to analyze"
    required: true
    flag: "--file"
    format: "flag"
  - name: "gadget_type"
    type: "string"
    description: "Gadget type (rop, jop, sys, all)"
    required: false
    flag: "--type"
    format: "flag"
    default: "rop"
  - name: "quality"
    type: "int"
    description: "Gadget quality level (1-5)"
    required: false
    flag: "--quality"
    format: "flag"
    default: 1
  - name: "arch"
    type: "string"
    description: "Target architecture (x86, x86_64, arm, etc.)"
    required: false
    flag: "--arch"
    format: "flag"
  - name: "search_string"
    type: "string"
    description: "Specific gadget pattern to search for"
    required: false
    flag: "--search"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional ropper arguments. Used to pass ropper options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Separate multiple arguments with spaces
      - Ensure correct argument format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
