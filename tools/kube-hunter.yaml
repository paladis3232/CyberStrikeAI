name: "kube-hunter"
command: "kube-hunter"
enabled: true
short_description: "Kubernetes penetration testing tool"
description: |
  Kube-hunter is a Kubernetes penetration testing tool for discovering security issues in Kubernetes clusters.

  **Key Features:**
  - Kubernetes security scanning
  - Vulnerability discovery
  - Configuration issue detection
  - Active and passive modes

  **Use Cases:**
  - Kubernetes security testing
  - Cluster security assessment
  - Penetration testing
  - Security auditing
parameters:
  - name: "target"
    type: "string"
    description: "Specific target to scan"
    required: false
    flag: "--remote"
    format: "flag"
  - name: "cidr"
    type: "string"
    description: "CIDR range to scan"
    required: false
    flag: "--cidr"
    format: "flag"
  - name: "interface"
    type: "string"
    description: "Network interface to scan"
    required: false
    flag: "--interface"
    format: "flag"
  - name: "active"
    type: "bool"
    description: "Enable active scanning (may be risky)"
    required: false
    flag: "--active"
    format: "flag"
    default: false
  - name: "report"
    type: "string"
    description: "Report format (json, yaml)"
    required: false
    flag: "--report"
    format: "flag"
    default: "json"
  - name: "additional_args"
    type: "string"
    description: |
      Additional kube-hunter parameters. Used to pass kube-hunter options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
