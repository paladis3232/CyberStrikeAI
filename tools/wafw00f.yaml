name: "wafw00f"
command: "wafw00f"
enabled: true
short_description: "WAF identification and fingerprinting tool"
description: |
  Wafw00f is a Web Application Firewall (WAF) identification and fingerprinting tool.

  **Key Features:**
  - WAF detection
  - WAF fingerprinting
  - Support for multiple WAFs
  - Bypass technique detection

  **Use Cases:**
  - WAF identification
  - Security testing
  - Penetration testing
  - Security assessment
parameters:
  - name: "target"
    type: "string"
    description: "Target URL or IP"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional wafw00f parameters. Used to pass wafw00f options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
