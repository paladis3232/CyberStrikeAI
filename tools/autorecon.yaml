name: "autorecon"
command: "autorecon"
enabled: true
short_description: "Automated comprehensive reconnaissance tool"
description: |
  AutoRecon is an automated comprehensive reconnaissance tool for performing thorough target enumeration.

  **Key Features:**
  - Automated port scanning
  - Service identification
  - Vulnerability scanning
  - Comprehensive reports

  **Use Cases:**
  - Comprehensive security assessment
  - Penetration testing
  - Network reconnaissance
  - Security auditing
parameters:
  - name: "target"
    type: "string"
    description: "Target IP address or hostname"
    required: true
    position: 0
    format: "positional"
  - name: "output_dir"
    type: "string"
    description: "Output directory"
    required: false
    flag: "-o"
    format: "flag"
    default: "/tmp/autorecon"
  - name: "additional_args"
    type: "string"
    description: |
      Additional autorecon parameters. Used to pass autorecon options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
