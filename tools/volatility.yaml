name: "volatility"
command: "volatility"
enabled: true
short_description: "Memory forensics analysis tool"
description: |
  Volatility is a memory forensics framework for extracting digital evidence from memory dumps.

  **Key Features:**
  - Memory dump analysis
  - Process list extraction
  - Network connection analysis
  - File system reconstruction

  **Use Cases:**
  - Memory forensics
  - Malware analysis
  - Incident response
  - Digital forensics
parameters:
  - name: "memory_file"
    type: "string"
    description: "Path to the memory dump file"
    required: true
    flag: "-f"
    format: "flag"
  - name: "plugin"
    type: "string"
    description: "Volatility plugin to use"
    required: true
    position: 0
    format: "positional"
  - name: "profile"
    type: "string"
    description: "Memory profile"
    required: false
    flag: "--profile"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional volatility parameters. Used to pass volatility options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
