name: "docker-bench-security"
command: "docker-bench-security"
enabled: true
short_description: "Docker security benchmark checking tool"
description: |
  Docker Bench for Security is a Docker security benchmark checking tool that verifies whether Docker configurations follow security best practices.

  **Key Features:**
  - Docker security benchmark checks
  - Configuration auditing
  - Security best practice checks
  - Detailed reports

  **Use Cases:**
  - Docker security auditing
  - Configuration checking
  - Compliance verification
  - Security assessment
parameters:
  - name: "checks"
    type: "string"
    description: "Specific checks to run"
    required: false
    flag: "-c"
    format: "flag"
  - name: "exclude"
    type: "string"
    description: "Checks to exclude"
    required: false
    flag: "-e"
    format: "flag"
  - name: "output_file"
    type: "string"
    description: "Output file path"
    required: false
    flag: "-l"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional docker-bench-security arguments. Used to pass docker-bench-security options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Separate multiple arguments with spaces
      - Ensure correct argument format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
