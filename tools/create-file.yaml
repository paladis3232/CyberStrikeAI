name: "create-file"
command: "python3"
args:
  - "-c"
  - |
    import base64
    import sys
    from pathlib import Path

    if len(sys.argv) < 3:
        sys.stderr.write("Usage: create-file <filename> <content> [binary]\n")
        sys.exit(1)

    filename = sys.argv[1]
    content = sys.argv[2]
    binary_arg = sys.argv[3].lower() if len(sys.argv) > 3 else "false"
    binary = binary_arg in ("1", "true", "yes", "on")

    path = Path(filename)
    if not path.is_absolute():
        path = Path.cwd() / path
    path.parent.mkdir(parents=True, exist_ok=True)

    if binary:
        data = base64.b64decode(content)
        path.write_bytes(data)
    else:
        path.write_text(content, encoding="utf-8")

    print(f"File created: {path}")
enabled: true
short_description: "File creation tool"
description: |
  Create files with specified content on the server.

  **Key Features:**
  - Create files
  - Write content
  - Support for binary files

  **Use Cases:**
  - File creation
  - Script generation
  - Data saving
parameters:
  - name: "filename"
    type: "string"
    description: "Filename to create"
    required: true
    position: 0
    format: "positional"
  - name: "content"
    type: "string"
    description: "File content"
    required: true
    position: 1
    format: "positional"
  - name: "binary"
    type: "bool"
    description: "Whether content is Base64-encoded binary"
    required: false
    position: 2
    format: "positional"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional create-file parameters. Used to pass create-file options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
