name: "winpeas"
command: "winPEAS.exe"
enabled: true
short_description: "Windows privilege escalation enumeration tool that automatically detects common privilege escalation paths"
description: |
  WinPEAS (Windows Privilege Escalation Awesome Script) is an automated privilege escalation enumeration tool for detecting common privilege escalation paths in Windows systems.

  **Key Features:**
  - System information gathering
  - User and group permission checks
  - Service configuration analysis
  - Registry checks
  - Scheduled task analysis
  - Network configuration checks
  - File permission checks
  - Credential discovery

  **Use Cases:**
  - Privilege escalation during penetration testing
  - Windows security auditing
  - Post-exploitation
  - CTF competitions

  **Notes:**
  - Requires winPEAS.exe to be downloaded on the target system
  - May require administrator privileges
  - Outputs a large amount of information; recommended to save to a file
parameters:
  - name: "quiet"
    type: "bool"
    description: "Quiet mode, shows only important information"
    required: false
    flag: "-q"
    format: "flag"
  - name: "notcolor"
    type: "bool"
    description: "Disable color output"
    required: false
    flag: "-notcolor"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional winpeas parameters. Used to pass winpeas options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
