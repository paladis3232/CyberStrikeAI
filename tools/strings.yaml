name: "strings"
command: "strings"
enabled: true
short_description: "Extract strings from binary files"
description: |
  The strings tool extracts printable strings from binary files.

  **Key Features:**
  - String extraction
  - Configurable minimum length
  - Support for multiple file formats

  **Use Cases:**
  - Binary analysis
  - Malware analysis
  - Forensic analysis
  - Reverse engineering
parameters:
  - name: "file_path"
    type: "string"
    description: "Path to the file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "min_len"
    type: "int"
    description: "Minimum string length"
    required: false
    flag: "-n"
    format: "flag"
    default: 4
  - name: "additional_args"
    type: "string"
    description: |
      Additional strings parameters. Used to pass strings options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
