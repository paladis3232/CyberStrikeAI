name: "wfuzz"
command: "wfuzz"
enabled: true
short_description: "Web application fuzzing tool"
description: |
  Wfuzz is a web application fuzzing tool for discovering vulnerabilities in web applications.

  **Key Features:**
  - Web application fuzzing
  - Parameter discovery
  - Directory discovery
  - Multiple filters

  **Use Cases:**
  - Web application security testing
  - Parameter fuzzing
  - Directory enumeration
  - Vulnerability discovery
parameters:
  - name: "url"
    type: "string"
    description: "Target URL (use FUZZ as placeholder)"
    required: true
    flag: "-u"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file path"
    required: false
    flag: "-w"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional wfuzz arguments. Used to pass wfuzz options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Separate multiple arguments with spaces
      - Ensure correct argument format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
