name: "rustscan"
command: "rustscan"
enabled: true
short_description: "Ultra-fast port scanner (Rust); optional greppable, batch, and script modes"
description: |
  RustScan 2.x: rapid port discovery with optional Nmap script integration.

  **CLI flag mapping:**
  - `-a` / `--addresses`: scan targets (comma-separated or file)
  - `-p`: comma-separated ports; `-r`: port range `start-end`
  - `-g` / `--greppable`: output ports only, suitable for grep/pipes
  - `--scripts`: **official default is "default"** (invokes Nmap); use **"none"** for port-only discovery (faster)
  - `-b` batch-size, `-t` timeout, `--scan-order` for speed/order tuning

  **Usage tips:**
  - Fast port scan without Nmap: set `scripts` to `none`, optionally add `-g`
  - Service detection/scripts: use `default` or `custom`, ensure Nmap is installed
parameters:
  # -a, --addresses
  - name: "target"
    type: "string"
    description: |
      Maps to `-a`: comma-separated CIDRs, IPs, or hostnames; also accepts a file path with a list.
      Examples: `192.168.1.1`, `10.0.0.1,10.0.0.2`, `192.168.0.0/24`
    required: true
    flag: "-a"
    format: "flag"

  # -p, --ports; use range (-r) for ranges, not this param
  - name: "ports"
    type: "string"
    description: |
      Ports to scan — **comma-separated list only**, maps to `-p`.
      Examples: `22,80,443`, `80,443,8080`.
      For a range like `1-1000`, use the **range** parameter (`-r`) instead.
    required: false
    flag: "-p"
    format: "flag"

  # -r, --range
  - name: "range"
    type: "string"
    description: |
      Port range in `start-end` format, maps to `-r`.
      Examples: `1-1000`, `1-65535` (full scan is slow).
      For discrete ports like `22,80,443` use **ports** (`-p`) instead.
    required: false
    flag: "-r"
    format: "flag"

  # -u, --ulimit
  - name: "ulimit"
    type: "int"
    description: "Increase ulimit for scanning; adjust based on system fd limits"
    required: false
    flag: "-u"
    format: "flag"
    default: 5000

  # --scripts: none | default | custom (CLI default: default)
  - name: "scripts"
    type: "string"
    description: |
      Script level; **must be a string**, do NOT pass true/false.
      - **none**: skip Nmap, port discovery only (fastest)
      - **default**: matches RustScan official default, invokes Nmap
      - **custom**: custom scripts, usually paired with additional_args
    required: false
    flag: "--scripts"
    format: "flag"
    default: "none"
    options:
      - "none"
      - "default"
      - "custom"

  # -g, --greppable
  - name: "greppable"
    type: "bool"
    description: "Greppable mode: output ports only, suitable for scripting or file output"
    required: false
    flag: "-g"
    format: "flag"
    default: false

  # -b, --batch-size [default: 4500]
  - name: "batch_size"
    type: "int"
    description: "Concurrent ports per batch; higher = faster, limited by OS open file count. Default: 4500"
    required: false
    flag: "-b"
    format: "flag"

  # -t, --timeout ms [default: 1500]
  - name: "timeout_ms"
    type: "int"
    description: "Per-port timeout in milliseconds. Default: 1500"
    required: false
    flag: "-t"
    format: "flag"

  # --scan-order serial | random [default: serial]
  - name: "scan_order"
    type: "string"
    description: "Scan order: serial (ascending) or random"
    required: false
    flag: "--scan-order"
    format: "flag"
    options:
      - "serial"
      - "random"

  # --top: top 1000 ports
  - name: "top_ports"
    type: "bool"
    description: "Scan built-in top 1000 ports (equivalent to `--top`)"
    required: false
    flag: "--top"
    format: "flag"
    default: false

  # -e, --exclude-ports
  - name: "exclude_ports"
    type: "string"
    description: "Exclude ports, comma-separated. Example: `80,443`"
    required: false
    flag: "-e"
    format: "flag"

  # -x, --exclude-addresses
  - name: "exclude_addresses"
    type: "string"
    description: "Exclude addresses, comma-separated CIDRs/IPs/hostnames"
    required: false
    flag: "-x"
    format: "flag"

  # --tries [default: 1]
  - name: "tries"
    type: "int"
    description: "Retry count before marking a port closed; 0 is corrected to 1"
    required: false
    flag: "--tries"
    format: "flag"

  - name: "additional_args"
    type: "string"
    description: |
      Options not listed above, space-separated.
      Examples: `--no-banner`, `--udp`, `-n` (ignore config file), `-c /path/config.toml`, `--resolver 8.8.8.8`
    required: false
    format: "positional"
