name: "rustscan"
command: "rustscan"
enabled: true
short_description: "Ultra-fast port scanning tool written in Rust"
description: |
  Rustscan is an ultra-fast port scanning tool written in Rust that can quickly scan large numbers of ports.

  **Key Features:**
  - Ultra-fast port scanning
  - Configurable scan speed
  - Nmap script integration support
  - Batch scanning support

  **Use Cases:**
  - Fast port scanning
  - Large-scale network scanning
  - Penetration testing information gathering
parameters:
  - name: "target"
    type: "string"
    description: "Target IP address or hostname"
    required: true
    flag: "-a"
    format: "flag"
  - name: "ports"
    type: "string"
    description: "Ports to scan (e.g.: 22,80,443 or 1-1000)"
    required: false
    flag: "-p"
    format: "flag"
  - name: "ulimit"
    type: "int"
    description: "File descriptor limit"
    required: false
    flag: "-u"
    format: "flag"
    default: 5000
  - name: "scripts"
    type: "bool"
    description: "Run Nmap scripts on discovered ports"
    required: false
    flag: "--scripts"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional rustscan parameters. Used to pass rustscan options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
