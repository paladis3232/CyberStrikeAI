name: "fierce"
command: "fierce"
enabled: true
short_description: "DNS reconnaissance tool"
description: |
  Fierce is a DNS reconnaissance tool for discovering subdomains of target domains.

  **Key Features:**
  - Subdomain discovery
  - DNS brute forcing
  - Zone transfer testing
  - Network mapping

  **Use Cases:**
  - DNS reconnaissance
  - Subdomain enumeration
  - Network mapping
  - Penetration testing
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain name"
    required: true
    flag: "-dns"
    format: "flag"
  - name: "dns_server"
    type: "string"
    description: "DNS server to use"
    required: false
    flag: "-dnsserver"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional fierce parameters. Used to pass fierce options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
