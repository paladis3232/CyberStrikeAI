name: "flaresolverr"
command: "flaresolverr-client"
enabled: true
short_description: "Cloudflare challenge-aware HTTP fetching via FlareSolverr API service"
description: |
  FlareSolverr tool profile for authorized web testing where anti-bot challenge pages
  block normal HTTP clients.

  This tool sends requests to a local FlareSolverr service and returns solved response
  content/cookies from a real browser context.

  **Key Features:**
  - Supports `request.get` and `request.post`
  - Session create/destroy support for sticky browser state
  - Optional custom headers, cookies, proxy, and user-agent
  - Useful for validating target behavior behind Cloudflare-like challenge flows

  **Usage Notes:**
  - Requires FlareSolverr service running on `http://127.0.0.1:8191/v1`
  - Use only against assets you are authorized to test
parameters:
  - name: "cmd"
    type: "string"
    description: "FlareSolverr command"
    required: false
    default: "request.get"
    flag: "--cmd"
    format: "flag"
    options: ["request.get", "request.post", "sessions.create", "sessions.destroy"]
  - name: "url"
    type: "string"
    description: "Target URL (required for request.get/request.post)"
    required: false
    flag: "--url"
    format: "flag"
  - name: "session_id"
    type: "string"
    description: "Session ID for sticky browser state"
    required: false
    flag: "--session-id"
    format: "flag"
  - name: "max_timeout"
    type: "integer"
    description: "Timeout in milliseconds"
    required: false
    default: 60000
    flag: "--max-timeout"
    format: "flag"
  - name: "post_data"
    type: "string"
    description: "POST body string for request.post"
    required: false
    flag: "--post-data"
    format: "flag"
  - name: "proxy_url"
    type: "string"
    description: "Proxy URL used by FlareSolverr (optional)"
    required: false
    flag: "--proxy-url"
    format: "flag"
  - name: "user_agent"
    type: "string"
    description: "Override User-Agent sent by browser context"
    required: false
    flag: "--user-agent"
    format: "flag"
  - name: "headers_json"
    type: "string"
    description: "JSON object for headers, e.g. {\"X-Test\":\"1\"}"
    required: false
    flag: "--headers-json"
    format: "flag"
  - name: "cookies_json"
    type: "string"
    description: "JSON array for cookies, e.g. [{\"name\":\"a\",\"value\":\"b\"}]"
    required: false
    flag: "--cookies-json"
    format: "flag"
  - name: "download"
    type: "bool"
    description: "Enable FlareSolverr download mode"
    required: false
    default: false
    flag: "--download"
    format: "flag"
  - name: "endpoint"
    type: "string"
    description: "FlareSolverr API endpoint URL"
    required: false
    default: "http://127.0.0.1:8191/v1"
    flag: "--endpoint"
    format: "flag"
