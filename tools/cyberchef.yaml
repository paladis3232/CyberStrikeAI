name: "cyberchef"
command: "cyberchef"
enabled: true
short_description: "Data transformation and analysis tool supporting encoding, encryption, and various data processing operations"
description: |
  CyberChef is a powerful data transformation and analysis tool supporting hundreds of data operations.

  **Key Features:**
  - Encoding/decoding (Base64, Hex, URL, etc.)
  - Encryption/decryption (AES, DES, RSA, etc.)
  - Hash computation
  - Data format conversion
  - Regular expression operations
  - Data extraction and analysis

  **Use Cases:**
  - CTF competitions
  - Data analysis and transformation
  - Encryption algorithm research
  - Digital forensics

  **Notes:**
  - Usually runs as a web interface
  - Command line version may require Node.js
  - Powerful but complex operations
parameters:
  - name: "recipe"
    type: "string"
    description: "Operation recipe (JSON format), defining the sequence of operations to execute"
    required: true
    flag: "-Recipe"
    format: "flag"
  - name: "input"
    type: "string"
    description: "Input data (string or file path)"
    required: true
    flag: "-Input"
    format: "flag"
  - name: "output"
    type: "string"
    description: "Output file path (optional)"
    required: false
    flag: "-Output"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional cyberchef parameters. Used to pass cyberchef options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
