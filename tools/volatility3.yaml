name: "volatility3"
command: "volatility3"
enabled: true
short_description: "Volatility3 memory forensics analysis tool"
description: |
  Volatility3 is the next-generation version of the Volatility framework for memory forensics analysis.

  **Key Features:**
  - Memory dump analysis
  - Advanced plugin system
  - Improved performance
  - Better documentation

  **Use Cases:**
  - Memory forensics
  - Malware analysis
  - Incident response
  - Digital forensics
parameters:
  - name: "memory_file"
    type: "string"
    description: "Path to the memory dump file"
    required: true
    flag: "-f"
    format: "flag"
  - name: "plugin"
    type: "string"
    description: "Volatility3 plugin to execute"
    required: true
    position: 0
    format: "positional"
  - name: "output_file"
    type: "string"
    description: "Output file path"
    required: false
    flag: "-o"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional volatility3 parameters. Used to pass volatility3 options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
