name: "one-gadget"
command: "one_gadget"
enabled: true
short_description: "Tool for finding one-shot RCE gadgets in libc"
description: |
  One-gadget is a tool for finding one-shot RCE gadgets in libc.

  **Key Features:**
  - One-shot gadget searching
  - Constraint level checking
  - Support for multiple libc versions

  **Use Cases:**
  - CTF challenges
  - Exploit development
  - ROP chain simplification
  - Security research
parameters:
  - name: "libc_path"
    type: "string"
    description: "Path to the libc binary file"
    required: true
    position: 0
    format: "positional"
  - name: "level"
    type: "int"
    description: "Constraint level (0, 1, 2)"
    required: false
    flag: "-l"
    format: "flag"
    default: 1
  - name: "additional_args"
    type: "string"
    description: |
      Additional one-gadget parameters. Used to pass one-gadget options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
