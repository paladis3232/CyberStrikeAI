name: "dirb"
command: "dirb"
enabled: true
# Short description (for tool list, reduces token consumption)
short_description: "Web directory and file scanning tool that discovers hidden directories and files on web servers via brute force"
# Detailed tool description
description: |
  Web directory and file scanning tool that discovers hidden directories and files on web servers via brute force.

  **Key Features:**
  - Directory and file discovery
  - Custom wordlist support
  - Detection of common web directory structures
  - Identification of sensitive files such as backups and configuration files
  - Support for multiple HTTP methods

  **Use Cases:**
  - Web application directory enumeration
  - Discovering hidden admin interfaces
  - Finding backup files and sensitive information
  - Information gathering during penetration testing

  **Notes:**
  - Scanning may generate a large number of HTTP requests
  - Some requests may be blocked by WAF
  - Recommended to use appropriate wordlists to improve efficiency
  - Scan results require manual verification
# Parameter definitions
parameters:
  - name: "url"
    type: "string"
    description: |
      Target URL, the web server address to scan.

      **Format requirements:**
      - Must include protocol (http:// or https://)
      - Can include a base path
      - Do not add trailing slash (unless scanning a specific directory)

      **Example values:**
      - Base URL: "http://example.com"
      - HTTPS: "https://example.com"
      - With port: "http://example.com:8080"
      - Specific directory: "http://example.com/admin"
      - With path: "http://example.com/app"

      **Notes:**
      - URL must be accessible
      - Ensure URL format is correct and includes protocol prefix
      - Required parameter, cannot be empty
    required: true
    position: 0
    format: "positional"
  - name: "wordlist"
    type: "string"
    description: |
      Wordlist file path containing the list of directories and filenames to try.

      **Format requirements:**
      - File path, can be absolute or relative
      - File has one directory or filename per line
      - Supports common wordlist file formats

      **Example values:**
      - Default wordlist: "/usr/share/dirb/wordlists/common.txt"
      - Custom wordlist: "/path/to/custom-wordlist.txt"
      - Common wordlist: "/usr/share/wordlists/dirb/common.txt"

      **Common wordlist files:**
      - common.txt: Common directories and files
      - big.txt: Large wordlist
      - small.txt: Small quick wordlist
      - extensions_common.txt: Common file extensions

      **Notes:**
      - If not specified, the default wordlist will be used
      - Ensure the wordlist file exists and is readable
      - Large wordlists significantly increase scan time
    required: false
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional Dirb parameters. Used to pass Dirb options not defined in the parameter list.

      **Example values:**
      - "-a": User agent string
      - "-H": Custom HTTP header
      - "-c": Cookie string
      - "-X": File extension
      - "-z": Millisecond delay

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
