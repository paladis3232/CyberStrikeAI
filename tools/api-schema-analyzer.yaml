name: "api-schema-analyzer"
command: "spectral"
args: ["lint"]
enabled: true
short_description: "API schema analysis tool for identifying potential security issues"
description: |
  Invokes `spectral lint` for static analysis of OpenAPI/Swagger/GraphQL schemas, compatible with custom rulesets and output formats.
parameters:
  - name: "schema_url"
    type: "string"
    description: "API schema file or URL (target passed to spectral lint)"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional Spectral parameters, e.g. `--ruleset`, `--format`, `--fail-severity`, etc.
    required: false
    format: "positional"
