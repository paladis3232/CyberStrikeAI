name: "pdfcrack"
command: "pdfcrack"
enabled: true
short_description: "PDF file password cracking tool supporting brute force and dictionary attacks"
description: |
  pdfcrack is a tool for cracking passwords on password-protected PDF files.

  **Key Features:**
  - Brute force attack
  - Dictionary attack
  - User password and owner password cracking
  - Support for multiple encryption algorithms

  **Use Cases:**
  - CTF competitions
  - PDF file password recovery
  - Security testing
  - Digital forensics

  **Notes:**
  - Cracking time depends on password complexity
  - Recommended to use dictionary files to improve efficiency
  - For authorized security testing only
parameters:
  - name: "file"
    type: "string"
    description: "Path to the PDF file to crack"
    required: true
    position: 0
    format: "positional"
  - name: "wordlist"
    type: "string"
    description: "Dictionary file path"
    required: false
    flag: "-w"
    format: "flag"
  - name: "min_length"
    type: "int"
    description: "Minimum password length"
    required: false
    flag: "-n"
    format: "flag"
  - name: "max_length"
    type: "int"
    description: "Maximum password length"
    required: false
    flag: "-m"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional pdfcrack parameters. Used to pass pdfcrack options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
