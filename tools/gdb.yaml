name: "gdb"
command: "gdb"
enabled: true
short_description: "GNU debugger for binary analysis and debugging"
description: |
  GDB is the GNU debugger for debugging and analyzing binary programs.

  **Key Features:**
  - Program debugging
  - Memory analysis
  - Disassembly
  - Breakpoint setting

  **Use Cases:**
  - Binary analysis
  - Vulnerability research
  - Reverse engineering
  - Program debugging
parameters:
  - name: "binary"
    type: "string"
    description: "Path to the binary file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "commands"
    type: "string"
    description: "GDB commands to execute (semicolon-separated)"
    required: false
    flag: "-ex"
    format: "flag"
  - name: "script_file"
    type: "string"
    description: "GDB script file path"
    required: false
    flag: "-x"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional gdb parameters. Used to pass gdb options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
