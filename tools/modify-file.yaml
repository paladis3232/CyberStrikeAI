name: "modify-file"
command: "python3"
args:
  - "-c"
  - |
    import sys
    from pathlib import Path

    if len(sys.argv) < 3:
        sys.stderr.write("Usage: modify-file <filename> <content> [append]\n")
        sys.exit(1)

    filename = sys.argv[1]
    content = sys.argv[2]
    append_arg = sys.argv[3].lower() if len(sys.argv) > 3 else "false"
    append = append_arg in ("1", "true", "yes", "on")

    path = Path(filename)
    if not path.is_absolute():
        path = Path.cwd() / path
    path.parent.mkdir(parents=True, exist_ok=True)

    mode = "a" if append else "w"
    with path.open(mode, encoding="utf-8") as f:
        f.write(content)

    action = "Appended" if append else "Overwritten"
    print(f"{action} write complete: {path}")
enabled: true
short_description: "File modification tool"
description: |
  Modify existing files on the server.

  **Key Features:**
  - Modify files
  - Append content
  - Overwrite content

  **Use Cases:**
  - File editing
  - Content appending
  - Configuration modification
parameters:
  - name: "filename"
    type: "string"
    description: "Filename to modify"
    required: true
    position: 0
    format: "positional"
  - name: "content"
    type: "string"
    description: "Content to write or append"
    required: true
    position: 1
    format: "positional"
  - name: "append"
    type: "bool"
    description: "Whether to append (true) or overwrite (false)"
    required: false
    default: false
    position: 2
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional modify-file parameters. Used to pass modify-file options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
