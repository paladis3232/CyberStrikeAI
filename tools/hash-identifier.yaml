name: "hash-identifier"
command: "python3"
args:
  - "-c"
  - |
    import shlex
    import subprocess
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing hash value\n")
        sys.exit(1)

    hash_value = sys.argv[1]
    extra = sys.argv[2] if len(sys.argv) > 2 else ""

    cmd = ["hash-identifier"]
    if extra:
        cmd.extend(shlex.split(extra))

    proc = subprocess.run(
        cmd,
        input=f"{hash_value}\n",
        capture_output=True,
        text=True,
    )

    if proc.returncode != 0:
        sys.stderr.write(proc.stderr or proc.stdout)
        sys.exit(proc.returncode)

    sys.stdout.write(proc.stdout)
enabled: true
short_description: "Hash type identification tool for identifying the type of unknown hash values"
description: |
  hash-identifier is a tool for identifying the type of hash values, helping determine the algorithm used by an unknown hash.

  **Key Features:**
  - Identify multiple hash algorithms
  - Supports MD5, SHA1, SHA256, bcrypt, and more
  - Interactive identification
  - Quickly identify common hash types

  **Supported Hash Types:**
  - MD5
  - SHA1, SHA256, SHA512
  - bcrypt
  - NTLM
  - MySQL
  - PostgreSQL
  - And many more hash algorithms

  **Use Cases:**
  - CTF password cracking
  - Hash value analysis
  - Cryptography research
  - Security auditing

  **Notes:**
  - Requires Python environment
  - Interactive tool, may require special handling
parameters:
  - name: "hash"
    type: "string"
    description: "The hash value to identify"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional hash-identifier parameters. Used to pass hash-identifier options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    default: ""
    position: 1
    format: "positional"
