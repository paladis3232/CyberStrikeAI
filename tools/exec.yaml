name: "exec"
command: "sh"
args: ["-c"]
enabled: true
# Short description (for tool list, reduces token consumption)
short_description: "System command execution tool for running Shell commands and system operations (use with caution)"
# Detailed tool description
description: |
  System command execution tool for running Shell commands and system operations.

  **Key Features:**
  - Execute arbitrary Shell commands
  - Support for bash, sh, and other shells
  - Can specify working directory
  - Returns command execution results

  **Use Cases:**
  - System administration and maintenance
  - Automated script execution
  - File operations and processing
  - System information gathering

  **Security Warnings:**
  - This tool can execute arbitrary system commands and poses security risks
  - Should only be used in controlled environments
  - All command executions will be logged
  - Recommended to limit the range of executable commands
  - Do not execute untrusted commands
# Parameter definitions
parameters:
  - name: "command"
    type: "string"
    description: |
      System command to execute. Can be any valid Shell command.

      **Format requirements:**
      - Complete Shell command
      - Can include pipes, redirections, and other Shell features
      - Supports environment variables

      **Example values:**
      - Simple command: "ls -la"
      - With pipe: "ps aux | grep nginx"
      - File operation: "cat /etc/passwd"
      - Network command: "curl http://example.com"
      - System info: "uname -a"
      - Find files: "find /var/log -name '*.log'"

      **Notes:**
      - Command will be executed in the specified shell
      - Ensure command syntax is correct
      - Be aware of security implications of commands
      - Required parameter, cannot be empty
    required: true
    position: 0
    format: "positional"
  - name: "shell"
    type: "string"
    description: |
      Shell type to use, defaults to sh.

      **Available values:**
      - sh: Standard Shell (default)
      - bash: Bash Shell
      - zsh: Z Shell
      - Other shells available on the system

      **Example values:**
      - "sh" (default)
      - "bash"
      - "zsh"

      **Notes:**
      - Ensure the specified shell is available on the system
      - Different shells may have slight differences in command syntax
    required: false
    default: "sh"
  - name: "workdir"
    type: "string"
    description: |
      Working directory for command execution. If not specified, uses the current working directory.

      **Format requirements:**
      - Absolute or relative path
      - Directory must exist

      **Example values:**
      - "/tmp"
      - "/var/log"
      - "./data"
      - "/home/user/project"

      **Notes:**
      - Ensure the directory exists and is accessible
      - Relative paths are relative to the program's running directory
    required: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional exec parameters. Used to pass exec options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
