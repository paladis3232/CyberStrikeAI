name: "radare2"
command: "r2"
enabled: true
short_description: "Binary analysis and reverse engineering framework with disassembly, debugging, and scripting support"
description: |
  Radare2 is a complete binary analysis and reverse engineering framework supporting multiple architectures and file formats.

  **Key Features:**
  - Disassembly and decompilation: supports multiple architectures (x86, ARM, MIPS, etc.)
  - Debugging support: local and remote debugging
  - Scripting support: r2pipe scripts and r2 command scripts
  - Multiple file formats: ELF, PE, Mach-O, firmware, etc.
  - Interactive analysis: command-line interface and visual mode
  - Automated analysis: batch analysis and scripted analysis

  **Use Cases:**
  - Binary file analysis
  - Reverse engineering and vulnerability research
  - Malware analysis
  - CTF reverse engineering challenges
  - Firmware analysis
  - Exploit development

  **Notes:**
  - Use the -c parameter to execute commands and exit (non-interactive mode)
  - Use the -i parameter to execute a script file
  - Use the -q parameter for quiet mode (suppresses startup messages)
  - Use the -A parameter to automatically analyze the binary file
  - Use the -d parameter to attach to a process for debugging
parameters:
  - name: "target"
    type: "string"
    description: |
      Target file, process ID, or special value.

      **Formats:**
      - File path: "/path/to/binary"
      - Process ID: "1234" (requires the -d parameter)
      - Special values: "-" (read from stdin), "--" (interactive mode), "=" (read from environment variable)

      **Example values:**
      - Binary file: "/tmp/vulnerable"
      - Process debugging: "1234" (with -d)
      - From stdin: "-"

      **Notes:**
      - Required parameter, cannot be empty
      - If a process ID is specified, the -d parameter must also be used
      - Note: radare2 requires the file path to be the last argument, so target uses position 1
    required: true
    position: 1
    format: "positional"
  - name: "commands"
    type: "string"
    description: |
      Radare2 commands to execute. Can be a single command or multiple commands separated by semicolons.

      **Formats:**
      - Single command: "aaa" (auto-analyze)
      - Multiple commands: "aaa; pdf @main; VV" (analyze, disassemble main function, visualize)

      **Common commands:**
      - "aaa": auto-analyze all functions
      - "afl": list all functions
      - "pdf @main": disassemble main function
      - "px 64": show 64 bytes in hex
      - "VV": enter visual mode
      - "i": show file info
      - "iz": show strings

      **Example values:**
      - "aaa" (auto-analyze)
      - "aaa; pdf @main" (analyze and disassemble main function)
      - "i; iz" (show info and strings)

      **Notes:**
      - Separate multiple commands with semicolons (;)
      - Program exits after commands complete (non-interactive mode)
    required: false
    flag: "-c"
    format: "flag"
  - name: "script_file"
    type: "string"
    description: |
      Path to a script file to execute. The script file contains Radare2 commands, one per line.

      **Formats:**
      - Script file path: "/path/to/script.r2"

      **Example values:**
      - "/tmp/analyze.r2"
      - "./scripts/auto_analyze.r2"

      **Notes:**
      - Commands in the script file are executed in order
      - Program exits after script execution
    required: false
    flag: "-i"
    format: "flag"
  - name: "arch"
    type: "string"
    description: |
      Specify target architecture.

      **Common architectures:**
      - "x86": 32-bit x86
      - "x86_64": 64-bit x86
      - "arm": ARM architecture
      - "arm64": ARM64 architecture
      - "mips": MIPS architecture
      - "ppc": PowerPC architecture

      **Example values:**
      - "x86"
      - "x86_64"
      - "arm"
      - "arm64"

      **Notes:**
      - If not specified, radare2 will attempt auto-detection
      - Some architectures may require additional configuration
    required: false
    flag: "-a"
    format: "flag"
  - name: "bits"
    type: "int"
    description: |
      Specify target bit width (16, 32, 64).

      **Example values:**
      - 16 (16-bit)
      - 32 (32-bit)
      - 64 (64-bit)

      **Notes:**
      - Usually used together with the -a parameter
      - If not specified, radare2 will attempt auto-detection
    required: false
    flag: "-b"
    format: "flag"
  - name: "auto_analyze"
    type: "bool"
    description: |
      Automatically analyze the binary file. Equivalent to executing the "aaa" command.

      **Use cases:**
      - Quick binary file analysis
      - Batch analysis

      **Notes:**
      - When enabled, automatically analyzes all functions
      - May take significant time
    required: false
    flag: "-A"
    format: "flag"
    default: false
  - name: "debug"
    type: "bool"
    description: |
      Debug mode. Can attach to a process or debug a file.

      **Use cases:**
      - Attach to a running process
      - Debug a binary file

      **Notes:**
      - Requires appropriate permissions
      - If target is a process ID, this option must be enabled
    required: false
    flag: "-d"
    format: "flag"
    default: false
  - name: "quiet"
    type: "bool"
    description: |
      Quiet mode. Suppresses startup messages and prompt.

      **Use cases:**
      - Scripted usage
      - Batch analysis
      - Automated tool invocation

      **Notes:**
      - Suitable for non-interactive use
      - Reduces output noise
    required: false
    flag: "-q"
    format: "flag"
    default: false
  - name: "seek"
    type: "string"
    description: |
      Set the starting address. Can be a hexadecimal address or expression.

      **Formats:**
      - Hexadecimal: "0x400000"
      - Expression: "main+0x10"

      **Example values:**
      - "0x400000"
      - "main"
      - "0x1000"

      **Notes:**
      - Address can be hexadecimal or a symbol name
      - Used to start analysis from a specific location
    required: false
    flag: "-s"
    format: "flag"
  - name: "base_address"
    type: "string"
    description: |
      Set the base address. Used for the load address.

      **Formats:**
      - Hexadecimal address: "0x400000"

      **Example values:**
      - "0x400000"
      - "0x1000000"

      **Notes:**
      - Used to specify the load address of a binary file
      - Typically used for firmware or memory dump analysis
    required: false
    flag: "-B"
    format: "flag"
  - name: "eval"
    type: "string"
    description: |
      Set configuration variables. Format is key=value.

      **Formats:**
      - "key=value"
      - Multiple variables separated by spaces: "asm.arch=x86 asm.bits=32"

      **Example values:**
      - "asm.arch=x86"
      - "asm.bits=32"
      - "scr.color=false"

      **Notes:**
      - Used to set radare2 configuration variables
      - Separate multiple variables with spaces
    required: false
    flag: "-e"
    format: "flag"
  - name: "project"
    type: "string"
    description: |
      Load or save a project file.

      **Formats:**
      - Project file path: "/path/to/project.r2"

      **Example values:**
      - "./project.r2"
      - "/tmp/analysis.r2"

      **Notes:**
      - Project files save analysis state and configuration
      - Can be used to restore a previous analysis
    required: false
    flag: "-p"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional radare2 arguments. Used to pass radare2 options not defined in the parameter list.

      **Available options:**
      - "-C": force color output
      - "-f": force open file (even if format does not match)
      - "-L": list supported plugins
      - "-M": enable write mode
      - "-n": do not load configuration files
      - "-N": do not execute scripts
      - "-S": start in debug mode
      - "-t": use thread mode
      - "-u": use unicorn engine
      - "-v": show version info
      - "-w": write mode
      - "-z": scan strings
      - "-X": execute r2pipe script
      - "-P patch": apply patch
      - "-m maddr": map address

      **Example values:**
      - "-w" (write mode)
      - "-n" (do not load config files)
      - "-M" (enable write mode)
      - "-z" (scan strings)

      **Notes:**
      - Separate multiple arguments with spaces
      - Ensure correct argument format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
