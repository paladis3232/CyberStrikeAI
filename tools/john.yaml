name: "john"
command: "john"
enabled: true
short_description: "John the Ripper password cracking tool"
description: |
  John the Ripper is a fast password cracking tool supporting multiple hash algorithms.

  **Key Features:**
  - Support for multiple hash algorithms
  - Dictionary attack
  - Brute force cracking
  - Rules engine

  **Use Cases:**
  - Password recovery
  - Hash cracking
  - Security testing
  - Forensic analysis
parameters:
  - name: "hash_file"
    type: "string"
    description: "File containing hashes"
    required: true
    position: 0
    format: "positional"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file"
    required: false
    default: "/usr/share/wordlists/rockyou.txt"
    flag: "--wordlist"
    format: "flag"
  - name: "format_type"
    type: "string"
    description: "Hash format type"
    required: false
    flag: "--format"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional John parameters"
    required: false
    format: "positional"
