name: "wpscan"
command: "wpscan"
enabled: true
# Allowed exit code list: wpscan returns exit code 4 when the target is not a WordPress site, which is normal informational output
allowed_exit_codes: [4]
short_description: "WordPress security scanner for detecting WordPress vulnerabilities"
description: |
  WPScan is a tool specifically designed for WordPress security scanning, capable of detecting themes, plugins, and core vulnerabilities.

  **Key Features:**
  - WordPress core vulnerability detection
  - Theme and plugin vulnerability scanning
  - User enumeration
  - Password brute forcing
  - Security configuration checks

  **Use Cases:**
  - WordPress security assessment
  - Vulnerability scanning
  - Penetration testing
  - Security auditing
parameters:
  - name: "url"
    type: "string"
    description: "WordPress site URL"
    required: true
    flag: "--url"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional WPScan parameters"
    required: false
    format: "positional"
