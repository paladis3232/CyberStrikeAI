name: "gdb-peda"
command: "gdb"
enabled: true
short_description: "GDB debugger with PEDA enhancements"
description: |
  GDB-PEDA is the GDB debugger enhanced with PEDA (Python Exploit Development Assistance).

  **Key Features:**
  - Enhanced GDB functionality
  - Automated analysis
  - Exploit development assistance
  - Visual display

  **Use Cases:**
  - Binary debugging
  - Exploit development
  - Reverse engineering
  - Security research
parameters:
  - name: "binary"
    type: "string"
    description: "Binary file to debug"
    required: false
    position: 0
    format: "positional"
  - name: "commands"
    type: "string"
    description: "GDB commands (semicolon-separated)"
    required: false
    flag: "-ex"
    format: "flag"
  - name: "attach_pid"
    type: "int"
    description: "Process ID to attach to"
    required: false
    flag: "-p"
    format: "flag"
  - name: "core_file"
    type: "string"
    description: "Core dump file path"
    required: false
    flag: "-c"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional gdb-peda arguments. Used to pass gdb-peda options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Separate multiple arguments with spaces
      - Ensure correct argument format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    format: "positional"
