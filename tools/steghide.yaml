name: "steghide"
command: "steghide"
enabled: true
short_description: "Steganography analysis tool"
description: |
  Steghide is a steganography tool for hiding data within image and audio files.

  **Key Features:**
  - Data hiding
  - Data extraction
  - Information viewing
  - Password protection

  **Use Cases:**
  - Steganography analysis
  - Hidden data detection
  - Forensic analysis
  - CTF challenges
parameters:
  - name: "action"
    type: "string"
    description: "Action type (extract, embed, info)"
    required: true
    position: 0
    format: "positional"
  - name: "cover_file"
    type: "string"
    description: "Cover file path (used with -cf for embed/info operations)"
    required: false
    flag: "-cf"
    format: "flag"
  - name: "embed_file"
    type: "string"
    description: "File to embed (for embed operation)"
    required: false
    flag: "-ef"
    format: "flag"
  - name: "passphrase"
    type: "string"
    description: "Passphrase"
    required: false
    flag: "-p"
    format: "flag"
  - name: "stego_file"
    type: "string"
    description: "Stego file path (output for embed, input for extract)"
    required: false
    flag: "-sf"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional steghide parameters. Used to pass steghide options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
