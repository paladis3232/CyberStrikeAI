name: "clair"
command: "clair"
enabled: false
short_description: "Container vulnerability analysis tool"
description: |
  Clair is a container vulnerability analysis tool for scanning container images for vulnerabilities.

  **Key Features:**
  - Container image scanning
  - Vulnerability detection
  - Support for multiple databases
  - API interface

  **Use Cases:**
  - Container security scanning
  - Vulnerability detection
  - CI/CD integration
  - Security auditing
parameters:
  - name: "image"
    type: "string"
    description: "Container image to scan"
    required: true
    flag: "--image"
    format: "flag"
  - name: "config"
    type: "string"
    description: "Clair configuration file"
    required: false
    flag: "--config"
    format: "flag"
    default: "/etc/clair/config.yaml"
  - name: "output_format"
    type: "string"
    description: "Output format (json, yaml)"
    required: false
    flag: "--format"
    format: "flag"
    default: "json"
  - name: "additional_args"
    type: "string"
    description: |
      Additional clair parameters. Used to pass clair options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
