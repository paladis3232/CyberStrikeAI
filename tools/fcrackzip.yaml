name: "fcrackzip"
command: "fcrackzip"
enabled: true
short_description: "ZIP file password cracking tool supporting brute force and dictionary attacks"
description: |
  fcrackzip is a tool for cracking passwords on password-protected ZIP files.

  **Key Features:**
  - Brute force attack
  - Dictionary attack
  - Custom character sets
  - Configurable password length range
  - Multi-threading support

  **Use Cases:**
  - CTF competitions
  - ZIP file password recovery
  - Security testing
  - Digital forensics

  **Notes:**
  - Cracking time depends on password complexity
  - Recommended to use dictionary files to improve efficiency
  - For authorized security testing only
parameters:
  - name: "file"
    type: "string"
    description: "Path to the ZIP file to crack"
    required: true
    position: 0
    format: "positional"
  - name: "dictionary_mode"
    type: "bool"
    description: "Enable dictionary attack mode (equivalent to -D)"
    required: false
    flag: "-D"
    format: "flag"
    default: false
  - name: "dictionary"
    type: "string"
    description: "Dictionary file path (used with -D)"
    required: false
    flag: "-p"
    format: "flag"
  - name: "bruteforce"
    type: "bool"
    description: "Use brute force mode"
    required: false
    flag: "-b"
    format: "flag"
  - name: "charset"
    type: "string"
    description: "Character set, e.g. 'aA1' means lowercase letters, uppercase letters, and digits"
    required: false
    flag: "-c"
    format: "flag"
  - name: "length_range"
    type: "string"
    description: "Password length range in min-max format (e.g. 4-8)"
    required: false
    flag: "-l"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional fcrackzip parameters. Used to pass fcrackzip options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
