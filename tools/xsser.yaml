name: "xsser"
command: "xsser"
enabled: true
short_description: "XSS vulnerability testing tool"
description: |
  XSSer is an automated XSS vulnerability testing tool.

  **Key Features:**
  - XSS vulnerability detection
  - Multiple XSS techniques
  - Automated testing
  - Report generation

  **Use Cases:**
  - XSS vulnerability testing
  - Web application security testing
  - Penetration testing
  - Vulnerability verification
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "--url"
    format: "flag"
  - name: "params"
    type: "string"
    description: "Parameters to test"
    required: false
    flag: "--Fp"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional xsser parameters. Used to pass xsser options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
