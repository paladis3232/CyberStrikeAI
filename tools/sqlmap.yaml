name: "sqlmap"
command: "sqlmap"
enabled: true
# Short description (for tool list, reduces token consumption)
short_description: "Automated SQL injection detection and exploitation tool for discovering and exploiting SQL injection vulnerabilities"
# Detailed tool description
description: |
  Automated SQL injection detection and exploitation tool for discovering and exploiting SQL injection vulnerabilities.

  **Key Features:**
  - Automatic SQL injection vulnerability detection
  - Support for multiple database types (MySQL, PostgreSQL, Oracle, MSSQL, etc.)
  - Automatic extraction of database information (tables, columns, data)
  - Support for multiple injection techniques (boolean-based blind, time-based blind, union query, etc.)
  - Support for advanced features such as file upload/download and command execution

  **Use Cases:**
  - Web application security testing
  - SQL injection vulnerability detection
  - Database information gathering
  - Penetration testing and vulnerability verification

  **Notes:**
  - For authorized security testing only
  - Some operations may affect the target system
  - Recommended to verify in a test environment first
  - Use --batch parameter to avoid interactive prompts
# Parameter definitions
parameters:
  - name: "url"
    type: "string"
    description: |
      Target URL containing parameters that may be vulnerable to SQL injection.

      **Format requirements:**
      - Complete URL including protocol (http:// or https://)
      - Must include query parameters; mark injection points with *
      - Or provide the complete URL and sqlmap will automatically detect parameters

      **Example values:**
      - Mark injection point: "http://example.com/page?id=1*"
      - Complete URL: "http://example.com/page?id=1"
      - POST data: "http://example.com/login" (requires data parameter)
      - Cookie injection: "http://example.com/page" (requires cookie parameter)

      **Notes:**
      - URL must be accessible
      - Ensure URL format is correct and includes protocol prefix
      - If using POST request, the data parameter must also be provided
      - Required parameter, cannot be empty
    required: true
    flag: "-u"
    format: "flag"
  - name: "batch"
    type: "bool"
    description: |
      Non-interactive mode, automatically selects default options without requiring user input.

      **Use Cases:**
      - Automated testing scripts
      - Batch scanning
      - Avoiding interactive prompts

      **Notes:**
      - Recommended to always set to true to avoid the tool waiting for user input
      - Default value is true
    required: false
    default: true
    flag: "--batch"
    format: "flag"
  - name: "level"
    type: "int"
    description: |
      Test level, range 1-5. Higher level means more comprehensive testing but longer duration.

      **Level descriptions:**
      - Level 1: Basic testing, fast but may miss vulnerabilities
      - Level 2: Default level, balances speed and coverage
      - Level 3: Extended testing, more comprehensive detection
      - Level 4: Deep testing, includes more payloads
      - Level 5: Most comprehensive testing, includes all known techniques

      **Recommendations:**
      - Use 1-2 for quick scanning
      - Use 3 for standard testing (default)
      - Use 4-5 for deep testing

      **Notes:**
      - Higher levels generate more requests and may be blocked by WAF
      - Default value is 3
    required: false
    default: 3
    flag: "--level"
    format: "combined" # --level=3
  - name: "data"
    type: "string"
    description: |
      POST data string for SQL injection detection in POST requests.

      **Format:**
      - Form data format, e.g.: "username=admin&password=123"
      - JSON format, e.g.: '{"username":"admin","password":"123"}'

      **Notes:**
      - If the URL uses POST method, this parameter must be provided
      - Mark injection points with * in parameter values
    required: false
    flag: "--data"
    format: "flag"
  - name: "cookie"
    type: "string"
    description: |
      Cookie string for cookie injection detection.

      **Format:**
      - Standard cookie format, e.g.: "sessionid=abc123; user=admin"

      **Notes:**
      - If cookie injection exists, this parameter must be provided
    required: false
    flag: "--cookie"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional SQLMap parameters. Used to pass SQLMap options not defined in the parameter list.

      **Example values:**
      - "--dbs": List all databases
      - "--tables -D database": List tables in a specified database
      - "--dump -D database -T table": Export table data
      - "--os-shell": Obtain OS shell
      - "--risk 2": Risk level (1-3)
      - "--threads 10": Number of concurrent threads
      - "--tamper space2comment": Use tamper script to bypass WAF

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
