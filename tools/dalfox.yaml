name: "dalfox"
command: "dalfox"
# dalfox v2+ uses subcommands; single-target mode is `dalfox url <target>`
args:
  - "url"
enabled: true
short_description: "Advanced XSS vulnerability scanner"
description: |
  Dalfox is an advanced XSS vulnerability scanner supporting multiple XSS detection techniques.

  **Key Features:**
  - XSS vulnerability detection
  - Blind XSS testing
  - DOM mining
  - Dictionary mining

  **Use Cases:**
  - XSS vulnerability testing
  - Web application security testing
  - Bug bounty reconnaissance
  - Security testing

  **Notes:**
  - Uses `dalfox url <target>` subcommand syntax (v2+)
  - Supports blind XSS callbacks
  - Can pipe URLs from other tools
parameters:
  - name: "target"
    type: "string"
    description: "Target URL to scan for XSS vulnerabilities. Example: `https://example.com/search?q=test`"
    required: true
    position: 1
    format: "positional"
  - name: "cookie"
    type: "string"
    description: "Cookie value for authenticated scanning. Example: `session=abc123`"
    required: false
    flag: "--cookie"
    format: "flag"
  - name: "blind"
    type: "string"
    description: "Blind XSS callback URL. Example: `https://your-callback.com`"
    required: false
    flag: "--blind"
    format: "flag"
  - name: "output"
    type: "string"
    description: "Output file path to save results"
    required: false
    flag: "--output"
    format: "flag"
  - name: "worker"
    type: "int"
    description: "Number of parallel workers. Default: 100"
    required: false
    flag: "--worker"
    format: "flag"
  - name: "timeout"
    type: "int"
    description: "Request timeout in seconds. Default: 10"
    required: false
    flag: "--timeout"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional dalfox parameters, space-separated.
      Examples: `--silence`, `--skip-bav`, `--follow-redirects`, `--proxy http://127.0.0.1:8080`
    required: false
    format: "positional"
