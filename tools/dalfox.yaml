name: "dalfox"
command: "dalfox"
enabled: true
short_description: "Advanced XSS vulnerability scanner"
description: |
  Dalfox is an advanced XSS vulnerability scanner supporting multiple XSS detection techniques.

  **Key Features:**
  - XSS vulnerability detection
  - Blind XSS testing
  - DOM mining
  - Dictionary mining

  **Use Cases:**
  - XSS vulnerability testing
  - Web application security testing
  - Bug bounty reconnaissance
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "pipe_mode"
    type: "bool"
    description: "Use pipe mode input"
    required: false
    flag: "--pipe"
    format: "flag"
    default: false
  - name: "blind"
    type: "string"
    description: "Blind XSS callback address (e.g. Burp Collaborator URL)"
    required: false
    flag: "--blind"
    format: "flag"
  - name: "mining_dom"
    type: "bool"
    description: "Enable DOM mining"
    required: false
    flag: "--mining-dom"
    format: "flag"
    default: true
  - name: "mining_dict"
    type: "bool"
    description: "Enable dictionary mining"
    required: false
    flag: "--mining-dict"
    format: "flag"
    default: true
  - name: "additional_args"
    type: "string"
    description: |
      Additional dalfox parameters. Used to pass dalfox options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
