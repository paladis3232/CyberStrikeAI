name: "nmap-advanced"
command: "nmap"
enabled: true
short_description: "Advanced Nmap scanning with support for custom NSE scripts and optimized timing"
description: |
  Advanced Nmap scanning tool supporting custom NSE scripts, optimized timing, and multiple scanning techniques.

  **Key Features:**
  - Multiple scanning techniques (SYN, TCP, UDP, etc.)
  - Custom NSE scripts
  - Timing optimization
  - OS detection and version detection

  **Use Cases:**
  - Advanced network scanning
  - In-depth security assessment
  - Penetration testing
  - Network reconnaissance
parameters:
  - name: "target"
    type: "string"
    description: "Target IP address or hostname"
    required: true
    position: 0
    format: "positional"
  - name: "scan_type"
    type: "string"
    description: "Scan type (-sS, -sT, -sU, etc.)"
    required: false
    format: "template"
    template: "{value}"
    default: "-sS"
  - name: "ports"
    type: "string"
    description: "Ports to scan"
    required: false
    flag: "-p"
    format: "flag"
  - name: "timing"
    type: "string"
    description: "Timing template (T0-T5)"
    required: false
    format: "template"
    template: "-T{value}"
    default: "4"
  - name: "nse_scripts"
    type: "string"
    description: "Custom NSE scripts to run"
    required: false
    flag: "--script"
    format: "flag"
  - name: "os_detection"
    type: "bool"
    description: "Enable OS detection"
    required: false
    flag: "-O"
    format: "flag"
    default: false
  - name: "version_detection"
    type: "bool"
    description: "Enable version detection"
    required: false
    flag: "-sV"
    format: "flag"
    default: false
  - name: "aggressive"
    type: "bool"
    description: "Enable aggressive scanning"
    required: false
    flag: "-A"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional nmap-advanced parameters. Used to pass nmap-advanced options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
