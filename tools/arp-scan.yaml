name: "arp-scan"
command: "arp-scan"
enabled: true
short_description: "ARP network discovery tool"
description: |
  Arp-scan is an ARP network discovery tool for discovering active hosts on the local network.

  **Key Features:**
  - ARP scanning
  - Local network discovery
  - MAC address identification
  - Fast scanning

  **Use Cases:**
  - Local network discovery
  - Host discovery
  - Network mapping
  - Penetration testing
parameters:
  - name: "target"
    type: "string"
    description: "Target IP range (if not using local_network)"
    required: false
    position: 0
    format: "positional"
  - name: "interface"
    type: "string"
    description: "Network interface"
    required: false
    flag: "-I"
    format: "flag"
  - name: "local_network"
    type: "bool"
    description: "Scan local network"
    required: false
    flag: "-l"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional arp-scan parameters. Used to pass arp-scan options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
