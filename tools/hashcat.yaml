name: "hashcat"
command: "hashcat"
enabled: true
short_description: "Advanced password cracking tool with GPU acceleration support"
description: |
  Hashcat is an advanced password recovery tool supporting multiple hash algorithms and attack modes.

  **Key Features:**
  - Support for multiple hash algorithms
  - GPU acceleration
  - Multiple attack modes (dictionary, combination, mask, etc.)
  - Rules engine

  **Use Cases:**
  - Password recovery
  - Hash cracking
  - Security testing
  - Forensic analysis
parameters:
  - name: "hash_file"
    type: "string"
    description: "File containing hashes"
    required: true
    position: 0
    format: "positional"
  - name: "hash_type"
    type: "string"
    description: "Hash type number"
    required: true
    flag: "-m"
    format: "flag"
  - name: "attack_mode"
    type: "string"
    description: "Attack mode (0=dictionary, 1=combination, 3=mask, etc.)"
    required: false
    default: "0"
    flag: "-a"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file"
    required: false
    default: "/usr/share/wordlists/rockyou.txt"
    position: 1
    format: "positional"
  - name: "mask"
    type: "string"
    description: "Mask (for mask attack)"
    required: false
    position: 2
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: "Additional Hashcat parameters"
    required: false
    format: "positional"
