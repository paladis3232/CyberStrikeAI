name: "checkov"
command: "checkov"
enabled: true
short_description: "Infrastructure as Code security scanning tool"
description: |
  Checkov is a static code analysis tool for security scanning of Infrastructure as Code (IaC).

  **Key Features:**
  - Support for multiple IaC frameworks (Terraform, CloudFormation, Kubernetes, etc.)
  - Hundreds of built-in policies
  - Custom policy support
  - CI/CD integration

  **Use Cases:**
  - IaC security scanning
  - Cloud configuration auditing
  - Security policy checking
  - Compliance checking
parameters:
  - name: "directory"
    type: "string"
    description: "Directory to scan"
    required: false
    flag: "-d"
    format: "flag"
    default: "."
  - name: "framework"
    type: "string"
    description: "Framework to scan (terraform, cloudformation, kubernetes, etc.)"
    required: false
    flag: "--framework"
    format: "flag"
  - name: "check"
    type: "string"
    description: "Specific checks to run"
    required: false
    flag: "--check"
    format: "flag"
  - name: "output_format"
    type: "string"
    description: "Output format (json, yaml, cli)"
    required: false
    flag: "--output"
    format: "flag"
    default: "json"
  - name: "additional_args"
    type: "string"
    description: |
      Additional checkov parameters. Used to pass checkov options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
