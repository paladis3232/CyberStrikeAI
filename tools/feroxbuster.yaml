name: "feroxbuster"
command: "feroxbuster"
enabled: true
short_description: "Recursive content discovery tool"
description: |
  Feroxbuster is a fast, simple recursive content discovery tool.

  **Key Features:**
  - Recursive directory discovery
  - Multi-threading support
  - Automatic filtering
  - Multiple output formats

  **Use Cases:**
  - Web content discovery
  - Directory enumeration
  - File discovery
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "wordlist"
    type: "string"
    description: "Wordlist file path"
    required: false
    flag: "-w"
    format: "flag"
  - name: "threads"
    type: "int"
    description: "Number of threads"
    required: false
    flag: "-t"
    format: "flag"
    default: 10
  - name: "additional_args"
    type: "string"
    description: |
      Additional feroxbuster parameters. Used to pass feroxbuster options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
