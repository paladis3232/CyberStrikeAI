name: "delete-file"
command: "rm"
enabled: true
short_description: "File or directory deletion tool"
description: |
  Delete files or directories on the server.

  **Key Features:**
  - Delete files
  - Delete directories
  - Recursive deletion

  **Use Cases:**
  - File cleanup
  - Temporary file deletion
  - Directory cleanup
parameters:
  - name: "filename"
    type: "string"
    description: "Filename or directory name to delete"
    required: true
    position: 0
    format: "positional"
  - name: "recursive"
    type: "bool"
    description: "Recursively delete directory"
    required: false
    flag: "-r"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional delete-file parameters. Used to pass delete-file options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
