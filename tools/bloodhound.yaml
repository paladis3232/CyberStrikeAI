name: "bloodhound"
command: "bloodhound-python"
enabled: true
short_description: "Active Directory attack path analysis and visualization tool"
description: |
  BloodHound is an Active Directory attack path analysis and visualization tool that collects domain information and analyzes attack paths.

  **Key Features:**
  - Domain information collection
  - Attack path analysis
  - Permission relationship visualization
  - Shortest attack path calculation
  - High-risk path identification

  **Use Cases:**
  - Active Directory security assessment
  - Post-exploitation
  - Domain environment auditing
  - Red team exercises

  **Notes:**
  - Requires domain user credentials
  - Requires Neo4j database support
  - Collection process may take a long time
  - Recommended to use in authorized environments
parameters:
  - name: "domain"
    type: "string"
    description: "Target domain name"
    required: false
    flag: "-d"
    format: "flag"
  - name: "username"
    type: "string"
    description: "Domain username"
    required: false
    flag: "-u"
    format: "flag"
  - name: "password"
    type: "string"
    description: "Domain user password"
    required: false
    flag: "-p"
    format: "flag"
  - name: "collection_method"
    type: "string"
    description: "Collection mode (All, ACL, DCOM, LocalAdmin, RDP, etc.)"
    required: false
    default: "All"
    flag: "-c"
    format: "flag"
  - name: "dc"
    type: "string"
    description: "Domain controller IP address"
    required: false
    flag: "-dc"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Additional bloodhound parameters. Used to pass bloodhound options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
