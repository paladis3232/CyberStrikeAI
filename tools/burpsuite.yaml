name: "burpsuite"
command: "burpsuite"
enabled: true
short_description: "Web application security testing platform"
description: |
  Burp Suite is a web application security testing platform providing comprehensive web security testing functionality.

  **Key Features:**
  - Web application security scanning
  - Proxy interception
  - Vulnerability scanning
  - Manual testing tools

  **Use Cases:**
  - Web application security testing
  - Penetration testing
  - Vulnerability scanning
  - Security assessment
parameters:
  - name: "project_file"
    type: "string"
    description: "Burp Suite project file path (--project-file)"
    required: false
    flag: "--project-file"
    format: "flag"
  - name: "config_file"
    type: "string"
    description: "Automation/scan configuration file (--config-file)"
    required: false
    flag: "--config-file"
    format: "flag"
  - name: "user_config_file"
    type: "string"
    description: "User configuration file (--user-config-file)"
    required: false
    flag: "--user-config-file"
    format: "flag"
  - name: "headless"
    type: "bool"
    description: "Run in headless mode"
    required: false
    flag: "--headless"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional burpsuite parameters. Used to pass burpsuite options not defined in the parameter list (e.g. --project-config, --log-config, etc.).
    required: false
    format: "positional"
