name: "arjun"
command: "arjun"
enabled: true
short_description: "HTTP parameter discovery tool"
description: |
  Arjun is an HTTP parameter discovery tool for finding hidden parameters in web applications.

  **Key Features:**
  - HTTP parameter discovery
  - Support for multiple HTTP methods
  - Multi-threading support
  - Stable mode

  **Use Cases:**
  - Parameter discovery
  - Web application security testing
  - Bug bounty reconnaissance
  - Security testing
parameters:
  - name: "url"
    type: "string"
    description: "Target URL"
    required: true
    flag: "-u"
    format: "flag"
  - name: "method"
    type: "string"
    description: "HTTP method (GET, POST, etc.)"
    required: false
    flag: "-m"
    format: "flag"
    default: "GET"
  - name: "wordlist"
    type: "string"
    description: "Custom wordlist file"
    required: false
    flag: "-w"
    format: "flag"
  - name: "threads"
    type: "int"
    description: "Number of threads"
    required: false
    flag: "-t"
    format: "flag"
    default: 25
  - name: "stable"
    type: "bool"
    description: "Use stable mode"
    required: false
    flag: "--stable"
    format: "flag"
    default: false
  - name: "additional_args"
    type: "string"
    description: |
      Additional Arjun parameters. Used to pass Arjun options not defined in the parameter list.

      **Example values:**
      - "-o output.txt": Output to file
      - "-q": Quiet mode
      - "-i": Read URLs from file

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
