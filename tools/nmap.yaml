name: "nmap"
command: "nmap"
args: ["-sT", "-sV", "-sC"] # Fixed parameters: TCP connect scan, version detection, default scripts
enabled: true
# Short description (for tool list, reduces token consumption) - one sentence describing tool purpose
short_description: "Network scanning tool for discovering network hosts, open ports, and services"
# Detailed tool description - helps the AI model understand tool purpose and use cases
description: |
  Network mapping and port scanning tool for discovering hosts, services, and open ports in a network.

  **Key Features:**
  - Host discovery: Detect active hosts in the network
  - Port scanning: Identify open ports on target hosts
  - Service identification: Detect service types and versions running on ports
  - OS detection: Identify the operating system of target hosts
  - Vulnerability detection: Use NSE scripts to detect common vulnerabilities

  **Use Cases:**
  - Network asset discovery and enumeration
  - Security assessment and penetration testing
  - Network troubleshooting
  - Port and service auditing

  **Notes:**
  - Uses -sT (TCP connect scan) instead of -sS (SYN scan), because -sS requires root privileges
  - Scan speed depends on network latency and target response
  - Some scans may be detected by firewalls or IDS
  - Ensure you have permission to scan the target network
# Parameter definitions
parameters:
  - name: "target"
    type: "string"
    description: |
      Target IP address or domain name. Can be a single IP, IP range, CIDR format, or domain name.

      **Example values:**
      - Single IP: "192.168.1.1"
      - IP range: "192.168.1.1-100"
      - CIDR: "192.168.1.0/24"
      - Domain: "example.com"
      - URL: "https://example.com" (domain part will be extracted automatically)

      **Notes:**
      - If a URL is provided, the domain part will be extracted automatically
      - Ensure the target address format is correct
      - Required parameter, cannot be empty
    required: true
    position: 0 # Positional parameter, placed at the end of the command
    format: "positional"
  - name: "ports"
    type: "string"
    description: |
      Port range to scan. Can be a single port, port range, comma-separated port list, or special value.

      **Example values:**
      - Single port: "80"
      - Port range: "1-1000"
      - Multiple ports: "80,443,8080,8443"
      - Combined: "80,443,8000-9000"
      - Common ports: "1-1024"
      - All ports: "1-65535"
      - Quick scan: "80,443,22,21,25,53,110,143,993,995"

      **Notes:**
      - If not specified, will scan the default 1000 common ports
      - Scanning all ports (1-65535) can be very time-consuming
      - Recommended to scan common ports first, then decide whether to scan all ports based on results
    required: false
    flag: "-p"
    format: "flag"
  - name: "scan_type"
    type: "string"
    description: |
      Scan type options. Can override the default scan type.

      **Common options:**
      - "-sV": Version detection
      - "-sC": Default script scan
      - "-sS": SYN scan (requires root privileges)
      - "-sT": TCP connect scan (default)
      - "-sU": UDP scan
      - "-A": Comprehensive scan (OS detection, version detection, script scanning, traceroute)

      **Notes:**
      - Multiple options can be combined, separated by spaces, e.g.: "-sV -sC"
      - Defaults already include "-sT -sV -sC"
      - If this parameter is specified, it will replace the default scan type
    required: false
    format: "template"
    template: "{value}"
  - name: "additional_args"
    type: "string"
    description: |
      Additional Nmap parameters. Used to pass Nmap options not defined in the parameter list.

      **Example values:**
      - "--script vuln": Run vulnerability detection scripts
      - "-O": OS detection
      - "-T4": Timing template (0-5, higher number is faster)
      - "--max-retries 3": Maximum number of retries
      - "-v": Verbose output

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
