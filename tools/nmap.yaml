name: "nmap"
command: "nmap"
# Default: TCP connect scan + version detection + default NSE scripts (works without root)
args: ["-sT", "-sV", "-sC"]
enabled: true
short_description: "Network scan: ports/services/scripts; optional timing, custom NSE, OS detection (requires root)"
description: |
  Network mapping and port scanning tool.

  **Default behavior (only target/ports needed):**
  - `-sT` TCP connect scan (no root required)
  - `-sV` version detection
  - `-sC` default NSE scripts

  **Optional enhancements:**
  - `timing`: `-T0`–`-T5` timing templates
  - `nse_scripts`: `--script` custom scripts (e.g. `vuln`, `http-*`)
  - `os_detection`: `-O` **requires root**; keep false without root
  - `aggressive`: `-A` **requires root** (includes OS detection)
  - `scan_type`: if set, **replaces** the default `-sT -sV -sC`; write all desired options yourself (e.g. `-sT -sV`)

  **Notes:**
  - `-sS` SYN scan requires root; use default or `-sT` without root
  - Full port scan `1-65535` is very slow; start with common ports
  - Ensure you have permission to scan the target
parameters:
  - name: "target"
    type: "string"
    description: |
      Target IP, hostname, CIDR, or domain; URLs will have the host extracted automatically.
      Examples: `192.168.1.1`, `10.0.0.0/24`, `example.com`
    required: true
    position: 1
    format: "positional"
  - name: "ports"
    type: "string"
    description: |
      Port range. Examples: `80`, `1-1000`, `80,443,8080`, `1-65535` (full scan is slow)
    required: false
    flag: "-p"
    format: "flag"
  - name: "timing"
    type: "string"
    description: "Timing template T0–T5; higher = faster. Example: `4` generates `-T4`"
    required: false
    format: "template"
    template: "-T{value}"
  - name: "nse_scripts"
    type: "string"
    description: "NSE scripts passed to `--script`. Examples: `vuln`, `http-title,http-headers`"
    required: false
    flag: "--script"
    format: "flag"
  - name: "os_detection"
    type: "bool"
    description: |
      Enable `-O` OS detection. **Requires root**; keep false without root.
    required: false
    flag: "-O"
    format: "flag"
    default: false
  - name: "aggressive"
    type: "bool"
    description: |
      Enable `-A` aggressive scan (includes OS detection). **Requires root**; keep false without root.
    required: false
    flag: "-A"
    format: "flag"
    default: false
  - name: "scan_type"
    type: "string"
    description: |
      Scan type options; **if set, replaces the default `-sT -sV -sC`**, keeping only what you write.
      Separate multiple options with spaces, e.g. `-sT -sV`, `-sU` (UDP).
    required: false
    format: "template"
    template: "{value}"
  - name: "additional_args"
    type: "string"
    description: |
      Extra arguments appended to the command, space-separated.
      Examples: `--max-retries 3`, `-v`, `-Pn`
    required: false
    format: "positional"
