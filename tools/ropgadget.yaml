name: "ropgadget"
command: "ROPgadget"
enabled: true
short_description: "ROP gadget search tool"
description: |
  ROPgadget is a tool for searching ROP gadgets in binary files.

  **Key Features:**
  - ROP gadget searching
  - Support for multiple architectures
  - Gadget classification
  - Exploit chain generation

  **Use Cases:**
  - Binary analysis
  - Exploit development
  - ROP chain construction
  - Security research
parameters:
  - name: "binary"
    type: "string"
    description: "Path to the binary file to analyze"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional ropgadget parameters. Used to pass ropgadget options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
