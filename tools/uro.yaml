name: "uro"
command: "python3"
args:
  - "-c"
  - |
    import shlex
    import subprocess
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing URL list\n")
        sys.exit(1)

    urls = sys.argv[1]
    extra = sys.argv[2] if len(sys.argv) > 2 else ""

    cmd = ["uro"]
    if extra:
        cmd.extend(shlex.split(extra))

    proc = subprocess.run(
        cmd,
        input=urls,
        capture_output=True,
        text=True,
    )
    if proc.stdout:
        sys.stdout.write(proc.stdout)
    if proc.stderr:
        sys.stderr.write(proc.stderr)
    sys.exit(proc.returncode)
enabled: true
short_description: "URL filtering tool for deduplicating similar URLs"
description: |
  Uro is a URL filtering tool that removes similar URLs and deduplicates results.

  **Key Features:**
  - URL deduplication
  - Similar URL filtering
  - Whitelist/blacklist support
  - Fast processing

  **Use Cases:**
  - URL deduplication
  - Result filtering
  - Data cleanup
  - Tool chain integration
parameters:
  - name: "urls"
    type: "string"
    description: "URLs to filter (one per line)"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional uro arguments. Used to pass uro options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Separate multiple arguments with spaces
      - Ensure correct argument format to avoid command injection
      - This parameter is appended directly to the end of the command
    required: false
    default: ""
    position: 1
    format: "positional"
