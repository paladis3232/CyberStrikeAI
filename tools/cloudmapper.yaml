name: "cloudmapper"
command: "cloudmapper"
enabled: true
short_description: "AWS network visualization and security analysis tool"
description: |
  CloudMapper is an AWS network visualization and security analysis tool.

  **Key Features:**
  - AWS network visualization
  - Security analysis
  - Network mapping
  - Admin discovery

  **Use Cases:**
  - AWS network analysis
  - Security assessment
  - Network visualization
  - Security auditing
parameters:
  - name: "action"
    type: "string"
    description: "Action to perform (collect, prepare, webserver, find_admins, etc.)"
    required: false
    default: "collect"
    position: 0
    format: "positional"
  - name: "account"
    type: "string"
    description: "AWS account to analyze"
    required: false
    flag: "--account"
    format: "flag"
  - name: "config"
    type: "string"
    description: "Configuration file path"
    required: false
    flag: "--config"
    format: "flag"
    default: "config.json"
  - name: "additional_args"
    type: "string"
    description: |
      Additional cloudmapper parameters. Used to pass cloudmapper options not defined in the parameter list.

      **Example values:**
      - Add common parameter examples based on tool characteristics

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    format: "positional"
