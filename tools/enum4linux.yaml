name: "enum4linux"
command: "enum4linux"
enabled: true
short_description: "SMB enumeration tool for Windows/Samba system information gathering"
description: |
  Enum4linux is a tool for enumerating SMB shares and Windows system information.

  **Key Features:**
  - SMB share enumeration
  - User and group enumeration
  - Password policy information
  - System information gathering

  **Use Cases:**
  - Windows system penetration testing
  - SMB security assessment
  - Network information gathering
  - Domain environment reconnaissance
parameters:
  - name: "target"
    type: "string"
    description: "Target IP address"
    required: true
    position: 0
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: "Additional Enum4linux parameters (default: -a)"
    required: false
    default: "-a"
    format: "positional"
