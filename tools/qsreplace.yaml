name: "qsreplace"
command: "python3"
args:
  - "-c"
  - |
    import shlex
    import subprocess
    import sys

    if len(sys.argv) < 2:
        sys.stderr.write("Missing URL list\n")
        sys.exit(1)

    urls = sys.argv[1]
    replacement = sys.argv[2] if len(sys.argv) > 2 else ""
    extra = sys.argv[3] if len(sys.argv) > 3 else ""

    cmd = ["qsreplace"]
    if extra:
        cmd.extend(shlex.split(extra))
    if replacement:
        cmd.append(replacement)

    proc = subprocess.run(
        cmd,
        input=urls,
        capture_output=True,
        text=True,
    )
    if proc.stdout:
        sys.stdout.write(proc.stdout)
    if proc.stderr:
        sys.stderr.write(proc.stderr)
    sys.exit(proc.returncode)
enabled: true
short_description: "Query string parameter replacement tool"
description: |
  Qsreplace is a tool for replacing query string parameters in URLs, commonly used for fuzzing.

  **Key Features:**
  - Parameter replacement
  - Batch processing
  - Multiple replacement modes
  - Fast processing

  **Use Cases:**
  - Parameter fuzzing
  - URL processing
  - Tool chain integration
  - Security testing
parameters:
  - name: "urls"
    type: "string"
    description: "URLs to process (one per line)"
    required: true
    position: 0
    format: "positional"
  - name: "replacement"
    type: "string"
    description: "Replacement string"
    required: false
    default: ""
    position: 1
    format: "positional"
  - name: "additional_args"
    type: "string"
    description: |
      Additional Qsreplace parameters. Used to pass Qsreplace options not defined in the parameter list.

      **Example values:**
      - "-a": Append mode
      - "-d": Delete parameter

      **Notes:**
      - Multiple parameters separated by spaces
      - Ensure parameter format is correct to avoid command injection
      - This parameter will be appended directly to the end of the command
    required: false
    default: ""
    position: 2
    format: "positional"
