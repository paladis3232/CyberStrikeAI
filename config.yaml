# ============================================
# CyberStrikeAI Configuration File
# ============================================
# This configuration file supports visual configuration through the Web interface.
# Click the "Settings" button in the top-right corner to modify the configuration.
# ============================================

# ============================================
# System Settings
# ============================================

# Version number displayed in the frontend (optional; if omitted, the default version is shown)
version: "v1.3.16"

# Server configuration
server:
  host: 0.0.0.0 # Listen address; 0.0.0.0 means listen on all network interfaces
  port: 8080     # HTTP service port; accessible in a browser at http://localhost:8080

# Authentication configuration
auth:
  password:  # Web login password — please change this to a strong password
  session_duration_hours: 12          # Login session duration (hours); re-login required after expiry

# Logging configuration
log:
  level: info   # Log level: debug, info, warn, error
  output: stdout # Log output destination: stdout, stderr, or a file path

# ============================================
# Conversation-related Configuration
# ============================================

# AI model configuration (supports OpenAI-compatible APIs)
# Required fields: api_key, base_url, and model must be filled in for the system to work.
# Supported API providers:
#   - OpenAI: https://api.openai.com/v1
#   - DeepSeek: https://api.deepseek.com/v1
#   - Other OpenAI-protocol-compatible APIs
# Common models: gpt-4, gpt-3.5-turbo, deepseek-chat, claude-3-opus, etc.
openai:
  base_url: https://api.deepseek.com/v1 # API base URL (required)
  api_key: sk-xxxx                       # API key (required)
  model: deepseek-chat                   # Model name (required)
  max_total_tokens: 120000              # Maximum token limit for LLM-related context (shared by memory compression and attack-chain building)

# ============================================
# Information Gathering (FOFA) Configuration (optional)
# ============================================
# Used by the "Information Gathering" page to call the FOFA API (backend proxy to avoid exposing the key in the frontend).
# Can also be configured via environment variables: FOFA_EMAIL / FOFA_API_KEY (higher priority).
fofa:
  base_url: "https://fofa.info/api/v1/search/all" # Optional; leave blank to use the default
  email: ""   # FOFA account email (optional; recommended to fill in via System Settings)
  api_key: "" # FOFA API key (optional; recommended to fill in via System Settings)

# Agent configuration
# When the maximum iteration count is reached, the AI will automatically summarize the test results.
agent:
  max_iterations: 120           # Maximum iteration count; maximum number of tool-call rounds for the AI agent
  large_result_threshold: 102400 # Large-result threshold (bytes); default 50 KB — results exceeding this size are automatically saved to storage
  result_storage_dir: tmp        # Result storage directory; large results will be saved here

# Database configuration
database:
  path: data/conversations.db    # SQLite database file path; used to store conversation history and messages
  knowledge_db_path: data/knowledge.db # Knowledge base database file path (optional; uses the session database if empty); stores knowledge base items and vector embeddings — can be copied and reused independently

# ============================================
# Task Management Configuration
# ============================================
# (Configuration items are included in the conversation-related configuration above)

# ============================================
# Vulnerability Management Configuration
# ============================================

# Security tools configuration
# The system loads all .yaml tool configuration files from this directory.
# Recommended: create a separate configuration file for each tool under the tools/ directory.
security:
  tools_dir: tools # Tool configuration file directory (relative to the configuration file location)
  # Tool description mode: controls which description is exposed to AI/API when loading tools
  #   short - prefer short_description (brief description, saves tokens); falls back to description if empty
  #   full  - use description (detailed description)
  tool_description_mode: full

# ============================================
# MCP Configuration
# ============================================

# MCP protocol configuration
# MCP (Model Context Protocol) is used for tool registration and invocation.
mcp:
  enabled: false # Whether to enable the MCP server (HTTP mode)
  host: 0.0.0.0  # MCP server listen address
  port: 8081     # MCP server port

# External MCP configuration
external_mcp:
  servers: {}

# ============================================
# Knowledge Base Configuration
# ============================================

knowledge:
  enabled: false                    # Whether to enable the knowledge retrieval feature
  base_path: knowledge_base         # Knowledge base directory path (relative to the configuration file location)
  embedding:
    provider: openai                # Embedding model provider (currently only openai is supported)
    model: text-embedding-v4        # Embedding model name
    base_url: https://api.deepseek.com/v1 # Leave blank to use the base_url from the OpenAI configuration
    api_key: sk-xxxxxx              # Leave blank to use the api_key from the OpenAI configuration
  retrieval:
    top_k: 5                        # Number of Top-K results returned by retrieval
    similarity_threshold: 0.7       # Similarity threshold (0–1); results below this value are filtered out
    hybrid_weight: 0.7              # Hybrid retrieval weight (0–1); weight of vector retrieval — 1.0 = pure vector retrieval, 0.0 = pure keyword retrieval

# ============================================
# Bot Configuration (WeCom, DingTalk, Lark/Feishu)
# ============================================
# Used to chat with CyberStrikeAI via WeCom/DingTalk/Lark on mobile; no server deployment required.
# Can be configured under System Settings -> Bot Settings.
robots:
  wecom: # WeCom (Enterprise WeChat)
    enabled: false
    token: ""
    encoding_aes_key: ""
    corp_id: ""
    secret: ""
    agent_id: 0
  dingtalk: # DingTalk
    enabled: false
    client_id:
    client_secret:
  lark: # Lark (Feishu)
    enabled: false
    app_id: ""
    app_secret: ""
    verify_token: ""

# ============================================
# Skills Configuration
# ============================================

# The system loads all skills from this directory. Each skill should be a directory containing a SKILL.md file.
# Example: skills/sql-injection-testing/SKILL.md
skills_dir: skills # Skills configuration file directory (relative to the configuration file location)

# ============================================
# Role Configuration
# ============================================

# The system loads all .yaml role configuration files from this directory.
# Each role should have its own configuration file, e.g.: roles/CTF.yaml, roles/default.yaml, etc.
roles_dir: roles # Role configuration file directory (relative to the configuration file location)
