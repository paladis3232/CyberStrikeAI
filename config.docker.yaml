# Docker runtime configuration for CyberStrikeAI

version: "v1.4.0"

server:
  host: 0.0.0.0
  port: 8080

auth:
  password: "ChangeMe_123!"
  session_duration_hours: 12

log:
  level: info
  output: stdout

openai:
  base_url: https://api.deepseek.com/v1
  api_key: sk-xxxx
  model: deepseek-chat
  max_total_tokens: 120000

fofa:
  base_url: "https://fofa.info/api/v1/search/all"
  email: ""
  api_key: ""

agent:
  max_iterations: 120
  large_result_threshold: 102400
  result_storage_dir: tmp
  parallel_tool_execution: true
  max_parallel_tools: 0
  tool_retry_count: 0
  tool_timeout: 600             # Per-tool execution timeout in seconds (0 = unlimited); 600 = 10 min
  time_awareness:
    enabled: true
    timezone: "UTC"
  memory:
    enabled: true
    max_entries: 200

database:
  path: data/conversations.db
  knowledge_db_path: data/knowledge.db

security:
  tools_dir: tools
  tool_description_mode: full

mcp:
  enabled: true
  host: 0.0.0.0
  port: 8081
  auth_header: ""        # Header name for MCP auth (e.g. "X-MCP-Token"); leave empty to disable auth
  auth_header_value: ""  # Secret value for the auth header

external_mcp:
  servers: {}

knowledge:
  enabled: false
  base_path: knowledge_base
  embedding:
    provider: openai
    model: text-embedding-v4
    base_url: https://api.deepseek.com/v1
    api_key: sk-xxxxxx
  retrieval:
    top_k: 5
    similarity_threshold: 0.7
    hybrid_weight: 0.7
  indexing:
    chunk_size: 512           # Max tokens per chunk (0 = auto from embedding model limit)
    chunk_overlap: 50         # Overlap tokens between chunks
    max_rpm: 100              # Max embedding API requests per minute (0 = unlimited)
    rate_limit_delay_ms: 0    # Fixed delay between embedding calls in ms (0 = use max_rpm)
    max_retries: 3            # Max retries on transient API errors
    retry_delay_ms: 1000      # Base retry delay in ms (doubles each attempt)

robots:
  wecom:
    enabled: false
    token: ""
    encoding_aes_key: ""
    corp_id: ""
    secret: ""
    agent_id: 0
  lark:
    enabled: false
    app_id: ""
    app_secret: ""
    verify_token: ""
  telegram:
    enabled: false
    bot_token: ""
    allowed_user_ids: []

skills_dir: skills
roles_dir: roles
